# Default values for solana-ontology Helm chart
# This is a YAML-formatted file.

# Global image settings
image:
  registry: ghcr.io
  repository: solana-ontology
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Ingestion service
ingestion:
  enabled: true
  replicas: 2
  grpcEndpoint: "http://yellowstone-grpc:10000"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  env:
    COMMITMENT_LEVEL: "confirmed"
    RECONNECT_INTERVAL_MS: "5000"

# OMS (Ontology Metadata Service)
oms:
  enabled: true
  replicas: 2
  port: 3000
  storage: "memory"
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# MCP Server
mcp:
  enabled: true
  replicas: 1
  transport: "http"
  port: 3001
  authRequired: false
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# SDK backend service
sdk:
  enabled: false
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 500m
      memory: 512Mi

# Horizontal Pod Autoscaler
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Ingress
ingress:
  enabled: false
  className: nginx
  hosts: []
  tls: []

# Secrets (templated — fill in via --set or external secrets manager)
secrets:
  rpcApiKey: ""
  kmsKeyId: ""
  mpcWebhookToken: ""
  omsAuthToken: ""
