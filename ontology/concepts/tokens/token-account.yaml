canonicalName: TokenAccount
aliases:
  - AssociatedTokenAccount
  - ATA
purpose: "Holds a specific token mint's balance for a wallet, tracking amount, delegate, and close state"
category: token
version: 1.0.0
owner: token-team
programId: "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA"
tokenStandard: spl
accountLayout:
  discriminator: "0000000000000000"
  fields:
    - name: mint
      type: publicKey
      offset: 0
      description: "The mint this account holds tokens for"
    - name: owner
      type: publicKey
      offset: 32
      description: "Wallet that owns this token account"
    - name: amount
      type: u64
      offset: 64
      description: "Token balance in base units"
    - name: delegate
      type: COption<publicKey>
      offset: 72
      description: "Optional delegated authority (COption<Pubkey>, 36 bytes)"
    - name: state
      type: u8
      offset: 108
      description: "Account state (0=uninitialized, 1=initialized, 2=frozen)"
    - name: isNative
      type: COption<u64>
      offset: 109
      description: "Whether this is a native (SOL wrapping) token account (COption<u64>, 12 bytes)"
    - name: delegatedAmount
      type: u64
      offset: 121
      description: "Amount delegated to the delegate"
    - name: closeAuthority
      type: COption<publicKey>
      offset: 129
      description: "Optional authority to close the account (COption<Pubkey>, 36 bytes)"
properties:
  - name: mint
    type: Address
    required: true
    description: "The mint this account holds tokens for"
  - name: owner
    type: Address
    required: true
    description: "Wallet that owns this token account"
  - name: amount
    type: u64
    required: true
    description: "Token balance in base units"
  - name: delegate
    type: Address
    required: false
    description: "Optional delegated authority"
  - name: delegatedAmount
    type: u64
    required: false
    description: "Amount delegated to the delegate"
  - name: isNative
    type: COption<u64>
    required: true
    description: "Whether this is a native (SOL wrapping) token account"
  - name: closeAuthority
    type: Address
    required: false
    description: "Optional authority to close the account"
relationships:
  - type: ownedBy
    target: TokenMint
    cardinality: "many:1"
    description: "Each token account is associated with exactly one mint"
  - type: ownedBy
    target: Program
    cardinality: "1:1"
    description: "Owned by SPL Token or Token-2022 program"
  - type: extends
    target: TokenExtension
    cardinality: "0:many"
    description: "Token-2022 accounts may have extensions"
stateMachine:
  states: [Uninitialized, Active, Frozen, Closed]
  transitions:
    - from: Uninitialized
      to: Active
      via: "Initialize token account or create ATA instruction"
    - from: Active
      to: Frozen
      via: "Mint freeze authority freezes the account"
    - from: Active
      to: Closed
      via: "Close account instruction drains lamports to destination"
constraints:
  - expression: "amount <= mint.supply"
    description: "Token account balance cannot exceed mint supply"
links:
  docs:
    - "https://solana.com/docs/core/tokens#token-account"
  anchorIdl: "token_program"
